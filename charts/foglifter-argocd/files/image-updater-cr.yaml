apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: foglifter-image-updater
  namespace: {{ .Release.Namespace }}
spec:
  commonUpdateSettings:
    updateStrategy: digest
    pullSecret: {{ printf "pullsecret:%s/%s" .Release.Namespace (default "foglifter-pullsecret" (omit (.Values.foglifter | default dict) "application").imagePullSecret) }}
  applicationRefs:
    - namePattern: "foglifter"
      images:
      {{- $foglifter := .Values.foglifter | default dict }}
      {{- $values := omit $foglifter "application" }}
      {{- $registry := $foglifter.registry | default "ghcr.io/vso-inc/" }}
      {{- range (.Values.imageUpdater).services }}
        {{- $svc := index $values . | default dict }}
        {{- if ne $svc.enabled false }}
        - alias: foglifter-{{ . }}
          imageName: "{{ $registry }}{{ $svc.repository }}:{{ $svc.tag }}"
          manifestTargets:
            helm:
              tag: "{{ . }}.tag"
        {{- end }}
      {{- end }}
    {{- with (.Values.imageUpdater).extraApplicationRefs }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
