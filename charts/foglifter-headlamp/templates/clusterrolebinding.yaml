{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "foglifter-headlamp.fullname" . }}-viewer
  labels:
    {{- include "foglifter-headlamp.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "foglifter-headlamp.fullname" . }}-viewer
subjects:
  - kind: ServiceAccount
    name: {{ .Values.headlamp.serviceAccount.name | required ".Values.headlamp.serviceAccount.name is required" }}
    namespace: {{ .Release.Namespace }}
{{- end }}
